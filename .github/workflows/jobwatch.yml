name: jobwatch
on:
  schedule:
    # offset minutes: GitHub sheds scheduled runs hardest at :00 spikes.
    # Each run then polls in a ~25-min loop (below), so even a shed schedule
    # slot leaves no coverage gap as long as runs fire at least every ~25 min.
    - cron: "6,16,26,36,46,56 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: jobwatch
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: require delivery secret
        env:
          DISCORD_WEBHOOK_SHAUN: ${{ secrets.DISCORD_WEBHOOK_SHAUN }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_SHAUN" ]; then
            echo "::error::Repo secret DISCORD_WEBHOOK_SHAUN is not set (Settings → Secrets and variables → Actions). Failing so alerts aren't silently dropped."
            exit 1
          fi
      - run: pip install -r requirements.txt
      - name: poll loop (~25 min of coverage per run, cycle every ~4 min)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
          DISCORD_WEBHOOK_SHAUN: ${{ secrets.DISCORD_WEBHOOK_SHAUN }}
        run: |
          git config user.name "jobwatch"
          git config user.email "jobwatch@users.noreply.github.com"
          END=$((SECONDS + 1500))
          while true; do
            python watcher.py --once
            git add state.json
            if ! git diff --cached --quiet; then
              git commit -m "state $(date -u +%FT%TZ)"
              git pull --rebase origin main && git push || echo "push failed, retrying next cycle"
            fi
            [ $SECONDS -ge $END ] && break
            sleep 150
          done
