name: jobwatch
on:
  schedule:
    # Dead-man restart only: each successful run dispatches its own successor
    # (see "chain next run"), so coverage doesn't depend on this best-effort
    # scheduler. If the chain breaks (a run fails), the next cron slot that
    # actually fires restarts it.
    - cron: "6,16,26,36,46,56 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

concurrency:
  group: jobwatch
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: require delivery secret
        env:
          DISCORD_WEBHOOK_SHAUN: ${{ secrets.DISCORD_WEBHOOK_SHAUN }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_SHAUN" ]; then
            echo "::error::Repo secret DISCORD_WEBHOOK_SHAUN is not set (Settings → Secrets and variables → Actions). Failing so alerts aren't silently dropped."
            exit 1
          fi
      - run: pip install -r requirements.txt
      - name: poll loop (~25 min of coverage per run, cycle every ~4 min)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
          DISCORD_WEBHOOK_SHAUN: ${{ secrets.DISCORD_WEBHOOK_SHAUN }}
          DISCORD_WEBHOOK_APPLY: ${{ secrets.DISCORD_WEBHOOK_APPLY }}
          DISCORD_WEBHOOK_INTERN: ${{ secrets.DISCORD_WEBHOOK_INTERN }}
          DISCORD_WEBHOOK_FULLTIME: ${{ secrets.DISCORD_WEBHOOK_FULLTIME }}
        run: |
          git config user.name "jobwatch"
          git config user.email "jobwatch@users.noreply.github.com"
          END=$((SECONDS + 1500))
          while true; do
            python watcher.py --once
            git add state.json
            if ! git diff --cached --quiet; then
              git commit -m "state $(date -u +%FT%TZ)"
              git pull --rebase origin main && git push || echo "push failed, retrying next cycle"
            fi
            [ $SECONDS -ge $END ] && break
            sleep 150
          done
      - name: publish job board
        run: |
          python watcher.py --board
          git add docs
          if ! git diff --cached --quiet; then
            git commit -m "board $(date -u +%FT%TZ)"
            git pull --rebase origin main && git push || echo "board push failed"
          fi
      - name: chain next run
        if: success()
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/jobwatch.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "successor dispatched"
