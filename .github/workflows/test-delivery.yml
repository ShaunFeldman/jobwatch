name: test delivery
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: send scenario demo to all channels
        env:
          DISCORD_WEBHOOK_SHAUN: ${{ secrets.DISCORD_WEBHOOK_SHAUN }}
          DISCORD_WEBHOOK_APPLY_INTERN: ${{ secrets.DISCORD_WEBHOOK_APPLY_INTERN }}
          DISCORD_WEBHOOK_APPLY_FULLTIME: ${{ secrets.DISCORD_WEBHOOK_APPLY_FULLTIME }}
          DISCORD_WEBHOOK_INTERN: ${{ secrets.DISCORD_WEBHOOK_INTERN }}
          DISCORD_WEBHOOK_FULLTIME: ${{ secrets.DISCORD_WEBHOOK_FULLTIME }}
        run: python watcher.py --test shaun
